<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MillieDev Admin</title>

<style>

/* ================= BASE ================= */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0a0f1f;
    color: #fff;
}

/* ================= TOP BAR ================= */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 18px;
    background: #0f1629;
    position: sticky;
    top: 0;
    z-index: 10;
}

.menu-btn {
    font-size: 24px;
    cursor: pointer;
}

.title {
    font-weight: bold;
}

/* ================= OVERLAY MENU (HAMBURGER) ================= */
.menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: rgba(15, 22, 41, 0.98);
    display: none;
    flex-direction: column;
    padding: 60px 20px;
    z-index: 999;
}

.menu a {
    color: #aaa;
    text-decoration: none;
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.menu a:hover {
    color: #fff;
}

/* ================= STATS ================= */
.stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 15px;
}

.card {
    background: #111a2e;
    padding: 15px;
    border-radius: 12px;
}

/* ================= BOOKINGS GRID ================= */
.section {
    padding: 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}

/* ================= BOOKING CARD (CLEAN PREMIUM) ================= */
.booking {
    background: #0f1629;
    padding: 14px;
    border-radius: 12px;
    border-left: 3px solid #6C63FF;
}

.name {
    font-weight: bold;
}

.meta {
    font-size: 12px;
    color: #aaa;
}

.service {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 6px;
    background: rgba(108,99,255,0.2);
    color: #6C63FF;
}

.msg {
    margin-top: 8px;
    font-size: 13px;
    color: #ccc;
}

/* ================= DESKTOP IMPROVEMENT ================= */
@media (min-width: 768px) {

    .stats {
        grid-template-columns: repeat(4, 1fr);
    }

    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="title">Dashboard</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
    <a href="#">Dashboard</a>
    <a href="#">Bookings</a>
    <a href="#">Analytics</a>
    <a href="#">Settings</a>
    <a href="#" onclick="toggleMenu()">Close</a>
</div>

<!-- STATS -->
<div class="stats">

    <div class="card">
        <h3>156</h3>
        <p>Total</p>
    </div>

    <div class="card">
        <h3>28</h3>
        <p>New</p>
    </div>

    <div class="card">
        <h3>102</h3>
        <p>Clients</p>
    </div>

    <div class="card">
        <h3>68%</h3>
        <p>Rate</p>
    </div>

</div>

<!-- BOOKINGS -->
<div class="section">

    <h3>Bookings</h3>

    <div class="grid" id="cards">
        <!-- MongoDB data goes here -->
    </div>

</div>

<script>

function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

</script>

</body>
</html>
