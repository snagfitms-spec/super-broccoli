<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="courses.html">Courses</a>
  <a href="about.html">About</a>
  <a href="booking.html">Booking</a>
</nav>

<section class="hero">
  <h1>Book a Service</h1>
</section>

<section class="box">

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>

    <button id="btn" onclick="bookService()">Submit Booking</button>

    <p id="msg"></p>

</section>

<script>
async function bookService() {

    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    if (!name || !email || !message) {
        msg.innerText = "Please fill all fields.";
        msg.style.color = "red";
        return;
    }

    btn.innerText = "Sending...";
    btn.disabled = true;

    try {
        const res = await fetch("https://millie-dav.onrender.com/bookings", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, email, message })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
            msg.innerText = "Booking sent successfully!";
            msg.style.color = "lightgreen";

            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("message").value = "";

        } else {
            msg.innerText = data.message || "Failed to send booking.";
            msg.style.color = "red";
        }

    } catch (error) {
        msg.innerText = "Server error. Try again.";
        msg.style.color = "red";
    }

    btn.innerText = "Submit Booking";
    btn.disabled = false;
}
</script>

</body>
</html>
