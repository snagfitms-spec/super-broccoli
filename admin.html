<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MillieDev Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="logo">MillieDev LIVE</div>
        <div class="nav-controls" style="display: flex; align-items: center; gap: 20px;">
            <a href="#"><i class="fa-solid fa-bell"></i></a>
            <div class="user-menu" style="cursor: pointer;" onclick="logout()">
                <i class="fa-solid fa-user-circle"></i> Admin
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="card glow-blue">
            <div class="icon blue"><i class="fa-solid fa-calendar-check"></i></div>
            <h3>Bookings</h3><p id="bookings">0</p>
        </div>
        <div class="card glow-pink">
            <div class="icon pink"><i class="fa-solid fa-users"></i></div>
            <h3>Users</h3><p id="users">0</p>
        </div>
        <div class="card glow-green">
            <div class="icon green"><i class="fa-solid fa-dollar-sign"></i></div>
            <h3>Revenue</h3><p id="revenue">$0</p>
        </div>
        <div class="card glow-orange">
            <div class="icon orange"><i class="fa-solid fa-briefcase"></i></div>
            <h3>Services</h3><p id="services">0</p>
        </div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>Service Performance</h3>
            <div class="bars-inner" style="margin: 20px 0;">
                <div class="bar">Web Design<div class="track"><div id="web" class="fill" style="background: #22C55E;"></div></div></div>
                <div class="bar">E-commerce<div class="track"><div id="eco" class="fill" style="background: #38BDF8;"></div></div></div>
                <div class="bar">Landing Pages<div class="track"><div id="land" class="fill" style="background: #F59E0B;"></div></div></div>
                <div class="bar">Custom Systems<div class="track"><div id="custom" class="fill" style="background: #FF4FD8;"></div></div></div>
            </div>
            <div class="donut-inner" style="position: relative; display: flex; justify-content: center; align-items: center; height: 180px; margin-top: 20px;">
                <canvas id="chart"></canvas>
                <div class="center-text" style="position: absolute; text-align: center; pointer-events: none;">
                    <h2 id="centerMoney" style="font-size: 1.4rem; color: #fff; margin: 0;">$0</h2>
                    <p style="font-size: 0.8rem; color: #94A3B8; margin: 0;">Total Revenue</p>
                </div>
            </div>
        </div>

        <div class="panel" style="max-height: 400px; overflow-y: auto;">
            <h3>Recent Booking Inquiries</h3>
            <div id="booking-landing-zone">
                <!-- Bookings land here with Avatar/Snippet style -->
            </div>
        </div>
    </div>

    <script>
        if (!sessionStorage.getItem("loggedIn")) { window.location.href = "/login"; }

        function logout() {
            if(confirm("Logout from MillieDev?")) {
                sessionStorage.removeItem("loggedIn");
                window.location.href = "/login";
            }
        }

        const socket = io("https://millie-dav.onrender.com");

        const chart = new Chart(document.getElementById("chart"), {
            type: "doughnut",
            options: { cutout: '75%', plugins: { legend: { display: false } } },
            data: { labels: ["Web", "Ecom", "Landing", "Custom"], datasets: [{ data: [0,0,0,0], backgroundColor: ["#22C55E","#38BDF8","#F59E0B","#FF4FD8"] }] }
        });

        // Consistent color generator for avatars
        function getAvatarColor(name) {
            const colors = ["#ef4444", "#f59e0b", "#10b981", "#3b82f6", "#8b5cf6", "#ec4899"];
            const index = name.length % colors.length;
            return colors[index];
        }

        async function updateInbox() {
            try {
                const res = await fetch("https://millie-dav.onrender.com/bookings");
                const bookings = await res.json();
                const zone = document.getElementById("booking-landing-zone");
                
                zone.innerHTML = bookings.map(b => `
                    <div class="booking-item">
                        <div class="avatar" style="background-color: ${getAvatarColor(b.name)}">
                            ${b.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="details">
                            <div class="name">${b.name}</div>
                            <div class="snippet">${b.message}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error("Inbox error:", err); }
        }

        socket.on("dashboard:update", (d) => {
            document.getElementById("bookings").innerText = d.totalBookings || 0;
            document.getElementById("revenue").innerText = "$" + (d.totalRevenue || 0).toLocaleString();
            document.getElementById("centerMoney").innerText = "$" + (d.totalRevenue || 0).toLocaleString();
            
            const b = d.breakdown || {};
            document.getElementById("web").style.width = (b["Web Design"]||0) + "%";
            document.getElementById("eco").style.width = (b["E-commerce"]||0) + "%";
            document.getElementById("land").style.width = (b["Landing Pages"]||0) + "%";
            document.getElementById("custom").style.width = (b["Custom Systems"]||0) + "%";
            
            chart.data.datasets[0].data = [b["Web Design"]||0, b["E-commerce"]||0, b["Landing Pages"]||0, b["Custom Systems"]||0];
            chart.update();
            updateInbox();
        });

        updateInbox();
    </script>
</body>
</html>
