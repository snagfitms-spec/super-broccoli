<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MillieDev Admin Dashboard - LIVE</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
    /* ... (Keep your existing CSS, I will help polish this next) ... */
    .mobile.active { display: flex; } /* Added this to fix your menu toggle */
</style>
</head>
<body>

<!-- ... (Keep your Topbar, Stats, and Revenue HTML as you have them) ... -->

<!-- BOOKINGS GRID -->
<div class="grid">
    <div class="panel">
        <h3>Recent Bookings</h3>
        <div id="list"></div>
    </div>
    <div class="panel">
        <h3>Bookings Overview</h3>
        <canvas id="bookingsTrendChart"></canvas>
    </div>
</div>

<script>
/* SOCKET CONNECTION */
const socket = io(window.location.origin); 

/* CHARTS INITIALIZATION */
const ctx = document.getElementById("chart").getContext('2d');
const chart = new Chart(ctx, {
    type: "doughnut",
    data: { labels: ["Web", "Ecom", "Landing", "Custom"], datasets: [{ data: [0,0,0,0], backgroundColor: ["#22C55E","#38BDF8","#F59E0B","#FF4FD8"] }] }
});

const trendCtx = document.getElementById("bookingsTrendChart").getContext('2d');
const trendChart = new Chart(trendCtx, {
    type: "line",
    data: { labels: ['May 1', 'May 8', 'May 15', 'May 22', 'May 29'], datasets: [{ data: [10, 25, 8, 35, 30], borderColor: "#FF4FD8", fill: true, tension: 0.4 }] },
    options: { responsive: true, scales: { y: { beginAtZero: true } } }
});

/* LIVE UPDATES */
socket.on("dashboard:update", (d) => {
    // 1. Update Numbers
    document.getElementById("bookings").innerText = d.totalBookings || 0;
    document.getElementById("revenue").innerText = "$" + (d.totalRevenue || 0);
    document.getElementById("centerMoney").innerText = "$" + (d.totalRevenue || 0);

    // 2. Update Progress Bars
    d.breakdown.forEach(item => {
        const idMap = { "Web Design": "web", "E-commerce": "eco", "Landing Pages": "land", "Custom": "custom" };
        const el = document.getElementById(idMap[item._id]);
        if (el) el.style.width = Math.min((item.total / (d.totalRevenue || 1)) * 100, 100) + "%";
    });

    // 3. Update Donut
    chart.data.datasets[0].data = d.breakdown.map(i => i.total);
    chart.update();
});

/* MENU TOGGLE */
function toggle(){ document.getElementById("mobile").classList.toggle("active"); }
</script>
</body>
</html>
