<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MillieDev Admin Dashboard - Layer 6</title>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= DESIGN SYSTEM ================= */
:root {
    --bg:#0a0f1f;
    --panel:#111a2e;
    --text:#fff;
    --muted:#94a3b8;

    --blue:#38BDF8;
    --green:#22C55E;
    --orange:#F59E0B;
    --pink:#FF4FD8;

    --border: rgba(255,255,255,0.08);
}

body {
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* ================= TOPBAR ================= */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px;
    background:#0f1629;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo {
    font-weight:bold;
    color:var(--blue);
}

#status {
    font-size:12px;
    color:var(--muted);
}

/* ================= STATS ================= */
.stats {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    padding:15px;
}

.card {
    background:var(--panel);
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
}

/* ================= REVENUE SECTION ================= */
.revenue {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:15px;
}

/* BARS */
.bars {
    background:var(--panel);
    border-radius:12px;
    padding:15px;
    border:1px solid var(--border);
}

.bar {
    margin-bottom:12px;
}

.track {
    height:6px;
    background:#1f2937;
    border-radius:10px;
    overflow:hidden;
}

.fill {
    height:6px;
    border-radius:10px;
}

.blue{background:var(--blue);}
.green{background:var(--green);}
.orange{background:var(--orange);}
.pink{background:var(--pink);}

/* DONUT */
.donut {
    background:var(--panel);
    border-radius:12px;
    padding:15px;
    border:1px solid var(--border);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.center-text {
    position:absolute;
    text-align:center;
}

/* BOOKINGS */
.panel {
    background:var(--panel);
    margin:15px;
    padding:15px;
    border-radius:12px;
    border:1px solid var(--border);
}

.booking {
    background:#0f1629;
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
}

/* MOBILE */
@media(max-width:900px){
    .stats{grid-template-columns:1fr 1fr;}
    .revenue{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="logo">MillieDev Admin</div>
    <div id="status">● Connecting...</div>
</div>

<!-- STATS -->
<div class="stats">
    <div class="card">
        <h3>Total Bookings</h3>
        <p id="totalBookings">0</p>
    </div>

    <div class="card">
        <h3>Users</h3>
        <p id="users">0</p>
    </div>

    <div class="card">
        <h3>Revenue</h3>
        <p id="revenue">$0</p>
    </div>

    <div class="card">
        <h3>Services</h3>
        <p id="services">0</p>
    </div>
</div>

<!-- REVENUE -->
<div class="revenue">

    <!-- LEFT: BARS -->
    <div class="bars">
        <h3>Service Performance</h3>

        <div class="bar">
            <small>Web Design</small>
            <div class="track"><div class="fill green" id="web"></div></div>
        </div>

        <div class="bar">
            <small>E-commerce</small>
            <div class="track"><div class="fill blue" id="ecom"></div></div>
        </div>

        <div class="bar">
            <small>Landing Pages</small>
            <div class="track"><div class="fill orange" id="landing"></div></div>
        </div>

        <div class="bar">
            <small>Custom Systems</small>
            <div class="track"><div class="fill pink" id="custom"></div></div>
        </div>
    </div>

    <!-- RIGHT: DONUT -->
    <div class="donut">
        <canvas id="chart"></canvas>

        <div class="center-text">
            <h2 id="centerRevenue">$0</h2>
            <small style="color:var(--muted)">Total Revenue</small>
        </div>
    </div>

</div>

<!-- BOOKINGS -->
<div class="panel">
    <h3>Live Bookings</h3>
    <div id="bookings"></div>
</div>

<script>

/* ================= SOCKET ================= */
const socket = io("https://millie-dav.onrender.com");

/* ================= STATUS ================= */
socket.on("connect", () => {
    document.getElementById("status").innerText = "● LIVE";
    document.getElementById("status").style.color = "#22C55E";
});

socket.on("disconnect", () => {
    document.getElementById("status").innerText = "● OFFLINE";
    document.getElementById("status").style.color = "red";
});

/* ================= CHART ================= */
const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {
    type:"doughnut",
    data:{
        labels:["Web","Ecom","Landing","Custom"],
        datasets:[{
            data:[0,0,0,0],
            backgroundColor:["#22C55E","#38BDF8","#F59E0B","#FF4FD8"]
        }]
    },
    options:{
        cutout:"70%",
        plugins:{ legend:{display:false} }
    }
});

/* ================= LIVE DASHBOARD ================= */
socket.on("dashboard:update", (data) => {

    document.getElementById("totalBookings").innerText = data.totalBookings || 0;
    document.getElementById("users").innerText = data.users || 0;
    document.getElementById("services").innerText = data.services || 0;

    document.getElementById("revenue").innerText = "$" + (data.totalRevenue || 0);
    document.getElementById("centerRevenue").innerText = "$" + (data.totalRevenue || 0);

    /* chart update */
    if (data.breakdown) {
        chart.data.datasets[0].data = data.breakdown.map(x => x.total);
        chart.update();
    }

    /* bars update */
    if (data.percent) {
        document.getElementById("web").style.width = data.percent.web + "%";
        document.getElementById("ecom").style.width = data.percent.ecom + "%";
        document.getElementById("landing").style.width = data.percent.landing + "%";
        document.getElementById("custom").style.width = data.percent.custom + "%";
    }
});

/* ================= LIVE BOOKINGS ================= */
socket.on("dashboard:newBooking", (b) => {

    const div = document.createElement("div");
    div.className = "booking";

    div.innerHTML = `
        <b>${b.name}</b><br/>
        ${b.email}<br/>
        <small>${b.service}</small>
    `;

    document.getElementById("bookings").prepend(div);
});

</script>

</body>
</html>
