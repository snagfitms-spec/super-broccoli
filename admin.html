<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MillieDev Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="logo">MillieDev LIVE</div>
        <button class="menu-btn" onclick="toggle()"><span></span><span></span><span></span></button>
        <div class="menu-container" id="mobile">
            <a href="#">Dashboard</a>
            <a href="#">Bookings</a>
            <a href="#">Analytics</a>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="card"><div class="icon blue"><i class="fa-solid fa-calendar-check"></i></div><h3>Total Bookings</h3><p id="bookings">0</p></div>
        <div class="card"><div class="icon pink"><i class="fa-solid fa-users"></i></div><h3>Users</h3><p id="users">0</p></div>
        <div class="card"><div class="icon green"><i class="fa-solid fa-dollar-sign"></i></div><h3>Revenue</h3><p id="revenue">$0</p></div>
        <div class="card"><div class="icon orange"><i class="fa-solid fa-briefcase"></i></div><h3>Services</h3><p id="services">0</p></div>
    </div>

    <!-- SERVICE PERFORMANCE & DONUT TWIN LAYOUT -->
    <div class="grid">
        <div class="panel" style="grid-column: span 2;">
            <h3>Service Performance</h3>
            <div class="revenue-wrapper">
                <div class="bars-inner">
                    <div class="bar">Web Design<div class="track"><div id="web" class="fill"></div></div></div>
                    <div class="bar">E-commerce<div class="track"><div id="eco" class="fill"></div></div></div>
                    <div class="bar">Landing Pages<div class="track"><div id="land" class="fill"></div></div></div>
                    <div class="bar">Custom Systems<div class="track"><div id="custom" class="fill"></div></div></div>
                </div>
                <div class="donut-inner">
                    <canvas id="chart"></canvas>
                    <div class="center-text" style="position: absolute; text-align: center; pointer-events: none;">
                        <h2 id="centerMoney" style="font-size: 1.1rem; margin: 0;">$0</h2>
                        <p style="font-size: 0.7rem; color: #94A3B8; margin: 0;">Revenue</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BOOKINGS TREND -->
    <div class="grid">
        <div class="panel"><h3>Recent Bookings</h3><div id="list"></div></div>
        <div class="panel" style="height: 300px;">
            <h3>Bookings Trend</h3>
            <canvas id="bookingsTrendChart" style="max-height: 200px;"></canvas>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin);

        const chart = new Chart(document.getElementById("chart"), {
            type: "doughnut",
            options: { cutout: '75%', plugins: { legend: { display: false } } },
            data: { labels: ["Web", "Ecom", "Landing", "Custom"], datasets: [{ data: [25,25,25,25], backgroundColor: ["#22C55E","#38BDF8","#F59E0B","#FF4FD8"] }] }
        });

        const trendChart = new Chart(document.getElementById("bookingsTrendChart"), {
            type: "line",
            options: { responsive: true, maintainAspectRatio: false },
            data: { 
                labels: ['M', 'T', 'W', 'T', 'F', 'S', 'S'], 
                datasets: [{ label: 'Bookings', data: [10, 20, 15, 30, 25, 40, 35], borderColor: "#FF4FD8", fill: true, tension: 0.4 }] 
            }
        });

        socket.on("dashboard:update", (d) => {
            document.getElementById("bookings").innerText = d.totalBookings || 0;
            document.getElementById("revenue").innerText = "$" + (d.totalRevenue || 0).toLocaleString();
            document.getElementById("centerMoney").innerText = "$" + (d.totalRevenue || 0).toLocaleString();
            
            const b = d.breakdown || {};
            document.getElementById("web").style.width = (b["Web Design"]||0) + "%";
            document.getElementById("eco").style.width = (b["E-commerce"]||0) + "%";
            document.getElementById("land").style.width = (b["Landing Pages"]||0) + "%";
            document.getElementById("custom").style.width = (b["Custom Systems"]||0) + "%";
            chart.data.datasets[0].data = [b["Web Design"]||0, b["E-commerce"]||0, b["Landing Pages"]||0, b["Custom Systems"]||0];
            chart.update();
        });

        function toggle(){ document.getElementById("mobile").classList.toggle("active"); }
    </script>
</body>
</html>
