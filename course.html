<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course | MillieDev</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= COURSE VIEWER LEVEL 10 ================= */

body {
    background: var(--bg);
}

/* HERO */
.course-header {
    padding: 90px 5%;
    text-align: center;
}

.course-title {
    font-size: 2.8rem;
    font-weight: 700;
}

.course-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    background: rgba(255,255,255,0.08);
}

/* DESCRIPTION */
.course-desc {
    max-width: 700px;
    margin: 20px auto;
    opacity: 0.75;
}

/* MODULES */
.module {
    background: var(--panel);
    border: 1px solid var(--border);
    margin: 15px auto;
    padding: 20px;
    border-radius: 12px;
    max-width: 900px;
    transition: 0.3s ease;
    cursor: pointer;
}

.module:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
}

/* LESSONS */
.lessons {
    margin-top: 10px;
    padding-left: 15px;
    display: none;
}

.module.active .lessons {
    display: block;
}

.lesson {
    padding: 6px 0;
    opacity: 0.8;
    cursor: pointer;
}

.lesson:hover {
    color: var(--primary);
}

/* BACK BUTTON */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: var(--primary);
    color: black;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

</style>

</head>

<body>

<div class="back-btn" onclick="history.back()">← Back</div>

<!-- COURSE HEADER -->
<div class="course-header">

    <h1 class="course-title" id="title">Loading...</h1>

    <div class="course-badge" id="level"></div>

    <p class="course-desc" id="desc"></p>

</div>

<!-- MODULE CONTAINER -->
<div id="modules"></div>

<script src="coursesData.js"></script>

<script>

/* ================= LOAD COURSE ================= */

const params = new URLSearchParams(window.location.search);
const courseId = params.get("id");

const course = courses[courseId];

if (!course) {
    document.getElementById("title").innerText = "Course Not Found";
} else {

    document.getElementById("title").innerText = course.title;
    document.getElementById("level").innerText = course.level;
    document.getElementById("desc").innerText = course.description;

    const container = document.getElementById("modules");

    course.modules.forEach((mod, index) => {

        const div = document.createElement("div");
        div.className = "module";

        div.innerHTML = `
            <h3>${mod.title}</h3>
            <p style="opacity:0.7;">${mod.description || ""}</p>

            <div class="lessons">
                ${mod.lessons.map(l => `<div class="lesson">• ${l}</div>`).join("")}
            </div>
        `;

        div.addEventListener("click", () => {
            div.classList.toggle("active");
        });

        container.appendChild(div);
    });
}

</script>

</body>
</html>
